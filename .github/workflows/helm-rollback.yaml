name: Helm Rollback
on:
  workflow_call:
    inputs:
      namespace:
        description: "Kubernetes namespace scope for this rollback"
        required: false
        default: api
        type: string
      environment:
        description: "Target environment for rollback (stg|prod)"
        required: true
        type: string
      deployment:
        description: "Name of the deployment to rollback. Defaults to repo name."
        required: false
        type: string
    secrets:
      k8s_server:
        required: true
      k8s_token:
        required: true

# Serialise rollbacks per (repository, environment, deployment) so a
# rollback can't race with a concurrent helm operation on the same
# release — same "another operation in progress" class of failure as
# on helm-deploy-eks.yaml. cancel-in-progress: false because canceling
# a rollback mid-flight would be worse than queueing.
concurrency:
  group: helm-deploy-${{ github.repository }}-${{ inputs.environment }}-${{ inputs.deployment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.image_tag }}
      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          token: ${{ github.token }}
      - name: Setup Kubectl
        uses: Azure/setup-kubectl@v4
        with:
          token: ${{ github.token }}
      - name: deploy
        run: |
          kubectl config set-cluster k8s --server="${{ secrets.k8s_server }}"
          kubectl config set-credentials deploy --token="${{ secrets.k8s_token }}"
          kubectl config set-context default --cluster=k8s --user=deploy
          kubectl config use-context default
          helm version
          kubectl version
          DEPLOYMENT="${{ github.event.repository.name }}"
          if [ ! -z "${{ inputs.deployment }}" ]; then
            DEPLOYMENT="${{ inputs.deployment }}"
          fi
          helm rollback ${DEPLOYMENT} -n ${{ inputs.namespace }}
      - name: Update GitHub release
        if: inputs.environment == 'prod'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.image_tag }}
          name: Release ${{ inputs.image_tag }}
          prerelease: false
          allowUpdates: true
          omitBodyDuringUpdate: true
