name: PHP Build and Push Image

on:
  workflow_call:
    inputs:
      php_version:
        required: false
        type: string
        default: "8.3"
      ref:
        description: "The ref used to build the image."
        required: false
        type: string
        default: ""
      tag:
        description: "The tag to use for the image build."
        required: true
        type: string
      dockerfile:
        description: "Path to the application dockerfile you want to build."
        required: true
        type: string
      build_target:
        description: "The build target to use for the image build."
        required: false
        type: string
        default: "app"
      image_name:
        description: "Image repo path override for separate images, e.g. <repo>-profiler. Empty = github.repository."
        required: false
        type: string
        default: ""
      extra_tag:
        description: "Optional companion tag to also push (e.g. latest, nginx-latest)."
        required: false
        type: string
        default: ""
      cache_type:
        description: "Buildx cache backend: gha or registry."
        required: false
        type: string
        default: "registry"
    secrets:
      packagist_username:
        required: true
      packagist_password:
        required: true
      gh_token:
        required: true

jobs:
  build-app:
    name: Build App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php_version }}
          tools: composer:v2
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 5
          command: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader --apcu-autoloader
        env:
          COMPOSER_AUTH: >
            {
              "http-basic": {
                "repo.packagist.com": {
                  "username": "${{ secrets.packagist_username }}",
                  "password": "${{ secrets.packagist_password }}"
                }
              }
            }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.gh_token }}
      - name: Resolve image name and tags
        id: meta
        env:
          IMAGE_NAME_INPUT: ${{ inputs.image_name }}
          TAG: ${{ inputs.tag }}
          EXTRA: ${{ inputs.extra_tag }}
        run: |
          name="$IMAGE_NAME_INPUT"; [ -z "$name" ] && name="${{ github.repository }}"
          ref="ghcr.io/${name}"
          tags="${ref}:${TAG}"
          [ -n "$EXTRA" ] && tags="${tags},${ref}:${EXTRA}"
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
      - name: Docker Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          platforms: linux/amd64
          target: ${{ inputs.build_target }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: ${{ inputs.cache_type == 'gha' && 'type=gha' || format('type=registry,ref=ghcr.io/{0}:buildcache', github.repository) }}
          cache-to: ${{ inputs.cache_type == 'gha' && 'type=gha,mode=max' || format('type=registry,ref=ghcr.io/{0}:buildcache,mode=max', github.repository) }}