name: Slack Notification
on:
  workflow_call:
    inputs:
      image_tag:
        description: "Tag of docker image to deploy"
        required: true
        type: string
      namespace:
        description: "Kubernetes namespace to deploy resources in"
        required: false
        default: api
        type: string
      dashboard_url:
        description: "url to deployment dashboard"
        required: false
        type: string
      apm_url:
        description: "url to service APM"
        required: false
        type: string
        default: "https://app.datadoghq.com/services?env=production"
    secrets:
      slack_webhook_url:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      # Classify the deploy as Release Train (rt) or Hotfix based on the
      # image tag shape. RT deploys tag `vX.Y.Z-rc.YYYY-MM-DD.N` — the rc
      # suffix with a train-date is the tell. Everything else (plain
      # `vX.Y.Z` main deploys, feature-branch tags, ad-hoc) is treated
      # as a hotfix / out-of-band deploy.
      #
      # Rationale (Peace Room 2026-07-09): during P0 triage the team needs
      # to quickly spot which prod deploys skipped the RT sign-off flow,
      # since hotfixes see less scrutiny and are more likely culprits.
      # This runs unconditionally because the workflow is prod-only by
      # structural design — callers only invoke it from prod deploy
      # paths (deploy-eks.yaml → slack-notification), so every message
      # emitted here is a prod message.
      - name: Classify deploy type
        id: type
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          if [[ "$IMAGE_TAG" =~ -rc\.[0-9]{4}-[0-9]{2}-[0-9]{2}\.[0-9]+$ ]]; then
            BADGE_MRKDWN="🚂 *RT*"
            BADGE_TEXT="🚂 RT"
            CLASSIFICATION="release-train"
          else
            BADGE_MRKDWN="⚡ *Hotfix*"
            BADGE_TEXT="⚡ Hotfix"
            CLASSIFICATION="hotfix"
          fi
          echo "Classified $IMAGE_TAG as $CLASSIFICATION"
          {
            echo "badge_mrkdwn=$BADGE_MRKDWN"
            echo "badge_text=$BADGE_TEXT"
            echo "classification=$CLASSIFICATION"
          } >> "$GITHUB_OUTPUT"

      # Compute the previous production release tag by walking the GH
      # Releases API and picking the most recent non-current, non-draft,
      # non-prerelease entry. Callers gate this workflow on
      # `inputs.environment == 'prod'`, so filtering out prereleases yields
      # the previous prod release specifically. Enables a compare link in
      # the Slack message so folks can see exactly what shipped.
      - name: Compute previous prod release + diff link
        id: diff
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          PREV_TAG=$(gh release list \
            --repo "${{ github.repository }}" \
            --exclude-drafts \
            --exclude-pre-releases \
            --json tagName,publishedAt \
            --limit 50 \
            | jq -r --arg cur "$CURRENT_TAG" \
              '[.[] | select(.tagName != $cur)] | sort_by(.publishedAt) | reverse | .[0].tagName // ""')
          if [ -n "$PREV_TAG" ]; then
            COMPARE_URL="${{ github.server_url }}/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG}"
            # Slack mrkdwn: leading tab preserves the indented-bullet style
            # used by the other lines in the payload.
            DIFF_LINE="\n\t<${COMPARE_URL}|View changes since ${PREV_TAG}>"
            echo "Previous prod release: $PREV_TAG"
            echo "Compare URL: $COMPARE_URL"
          else
            # First prod release for this repo — nothing to diff against.
            DIFF_LINE=""
            echo "No previous prod release found — first-time prod deploy."
          fi
          {
            echo "previous_tag=$PREV_TAG"
            echo "diff_line<<EOF"
            printf '%s' "$DIFF_LINE"
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send deployment notification
        uses: slackapi/slack-github-action@v1.24.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        with:
          payload: |
            {
              "text": "${{ steps.type.outputs.badge_text }} · ${{ github.event.repository.name }} deployed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ steps.type.outputs.badge_mrkdwn }} · *${{ github.event.repository.name }} deployed by ${{ github.triggering_actor }}*\n\tVersion: `${{ inputs.image_tag }}`\n\tView the <${{ inputs.dashboard_url }}|Deployment>\n\tView the <${{ inputs.apm_url }}|Service APM>${{ steps.diff.outputs.diff_line }}"
                  },
                  "accessory": {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "${{ inputs.image_tag }}"
                    },
                    "url": "${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ inputs.image_tag }}"
                  }
                }
              ]
            }
