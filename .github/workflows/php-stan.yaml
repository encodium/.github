name: PHPStan
on:
  workflow_call:
    inputs:
      php_version:
        required: false
        type: string
        default: "8.3"
      command:
        description: "The command to run to for phpstan"
        required: false
        type: string
        default: "composer phpstan"
      error_file:
        description: "The path to the error file to capture phpstan JSON errors"
        required: false
        type: string
        default: "phpstan-errors.json"
      artifact_name:
        description: "The name of the phpstan artifact"
        required: false
        type: string
        default: "phpstan-errors"
      cache_path:
        description: "The tmpDir path (i.e. ./.phpstan.cache)"
        required: false
        type: string
        default: "./.phpstan.cache"
      runs_on:
        description: "The OS to run the job on"
        required: false
        type: string
        default: "ubuntu-latest"
    secrets:
      packagist_username:
        required: true
      packagist_password:
        required: true

jobs:
  phpstan:
    runs-on: ${{ inputs.runs_on }}
    name: PHPStan
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          coverage: none
          php-version: ${{ inputs.php_version }}
          tools: composer
          extensions: mbstring, xml, curl, redis
        env:
          COMPOSER_AUTH_JSON: |
            {
              "http-basic": {
                "repo.packagist.com": {
                  "username": "${{ secrets.packagist_username }}",
                  "password": "${{ secrets.packagist_password }}"
                }
              }
            }

      # symfony/cache 7.4+ conflicts with ext-redis < 6.1; GitHub images may ship 5.x
      - name: Ensure ext-redis >= 6.1
        shell: bash
        run: |
          set -euo pipefail
          if php -r 'exit(version_compare(phpversion("redis") ?: "0", "6.1.0", ">=") ? 0 : 1);'; then
            php -r 'echo "ext-redis ".phpversion("redis")." OK\n";'
            exit 0
          fi
          echo "ext-redis $(php -r 'echo phpversion("redis") ?: "missing";') is below 6.1; upgrading via PECL"
          sudo pecl uninstall -r redis 2>/dev/null || true
          printf '\n' | sudo pecl install redis
          php -r 'if (version_compare(phpversion("redis") ?: "0", "6.1.0", "<")) { fwrite(STDERR, "ext-redis still < 6.1 after PECL install\n"); exit(1); }'
          php -r 'echo "ext-redis ".phpversion("redis")." OK\n";'

      - name: Install composer dependencies
        uses: ramsey/composer-install@v2

      - name: Restore PHPStan Cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ inputs.cache_path }}
          key: "${{ runner.os }}-phpstan-${{ github.repository }}-${{ github.run_id }}"
          restore-keys: |
            ${{ runner.os }}-phpstan-${{ github.repository }}-${{ github.ref_name }}
            ${{ runner.os }}-phpstan-${{ github.repository }}-${{ github.event.repository.default_branch }}

      - name: Run PHPStan
        run: ${{ inputs.command }}
        env:
          PHPSTAN_ERROR_FILE: ${{ inputs.error_file }}

      - name: Cache PHPStan Results
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ inputs.cache_path }}
          key: "${{ runner.os }}-phpstan-${{ github.repository }}-${{ github.run_id }}"

      - name: phpstan errors artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.error_file }}
          include-hidden-files: true
