name: Helm Deployment for EKS
on:
  workflow_call:
    inputs:
      image_tag:
        description: "Tag of docker image to deploy"
        required: true
        type: string
      namespace:
        description: "Kubernetes namespace to deploy resources in"
        required: false
        default: api
        type: string
      values-file:
        description: "Additional values.yaml file to include in deployment"
        required: false
        type: string
      environment:
        description: "Target environment for deployment (stg|prod)"
        required: true
        type: string
      atomic:
        description: "If true, helm upgrade uses --atomic enabling auto-rollback upon failure"
        default: false
        required: false
        type: boolean
      release_name:
        description: "Option to override helm release name. (i.e. 'internal-api')"
        default: ""
        required: false
        type: string
      timeout:
        description: "Timeout for helm upgrade"
        default: "5m"
        required: false
        type: string
      additional-values-file:
        description: "Extra additional values.yaml file to include in deployment"
        required: false
        type: string
    secrets:
      kubeconfig:
        required: true
      aws_access_id:
        required: true
      aws_access_secret:
        required: true

# Serialise deploys per (repository, environment, release_name). Two
# `helm upgrade` calls targeting the same release cannot run concurrently
# — helm rejects the second with "another operation (install/upgrade/
# rollback) is in progress" (surfaced 2026-07-08 after the fire-and-
# forget dispatch refactor decoupled deploy timing from Build timing).
#
# cancel-in-progress: false so the current deploy runs to completion.
# Canceling an in-flight helm upgrade mid-flight risks leaving the
# release in a weird state; queueing the next dispatch is safer.
#
# The group name is scoped to (repo, env, release_name) so unrelated
# deploys don't block each other — a stg deploy for internal_api can
# proceed while a stg deploy for catalog_api runs.
concurrency:
  group: helm-deploy-${{ github.repository }}-${{ inputs.environment }}-${{ inputs.release_name || github.event.repository.name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.image_tag }}
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.aws_access_id }}
          aws-secret-access-key: ${{ secrets.aws_access_secret }}
          aws-region: us-east-1
          role-duration-seconds: 1200
          role-session-name: GithubActions-${{ github.event.repository.name }}
      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          # token: fetches the latest Helm release from GitHub. Without it
          # the action falls back to a hardcoded default version and emits
          # a warning on every deploy log.
          token: ${{ github.token }}
      - name: Setup Kubectl
        uses: Azure/setup-kubectl@v4
        with:
          token: ${{ github.token }}
      - name: deploy
        # Raise helm's client-side API rate limits. `helm upgrade --wait`
        # polls the status of every object in the release on a loop; large
        # releases (e.g. webstore: ~90+ pods + deployments/services/ingress)
        # exceed helm's low default QPS and the client-go rate limiter errors
        # with "client rate limiter Wait returned an error: rate: Wait(n=1)
        # would exceed context deadline", failing an otherwise-healthy deploy
        # (webstore prod, 2026-07-09, DEVEX-1687). The API server's own
        # Priority & Fairness still protects it; this only relaxes the client.
        env:
          HELM_QPS: "50"
          HELM_BURST_LIMIT: "300"
        run: |
          echo "${{ secrets.kubeconfig }}" >> kube.config
          export KUBECONFIG=./kube.config
          helm version
          kubectl version

          if [ ! -z "${{ inputs.values-file }}" ]; then
            ARG_VALUES_FILE="-f ${{ inputs.values-file }}"
          fi

          if [ ! -z "${{ inputs.additional-values-file }}" ]; then
            ARG_VALUES_FILE="${ARG_VALUES_FILE} -f ${{ inputs.additional-values-file }}"
          fi

          WAIT_ARG="--wait"
          if [[ "${{ inputs.atomic }}" == true ]]; then
            WAIT_ARG="--atomic"
          fi

          TIMEOUT_ARG=""
          if [[ ! -z "${{ inputs.timeout }}" ]]; then
            TIMEOUT_ARG="--timeout ${{ inputs.timeout }}"
          fi

          RELEASE_NAME="${{ github.event.repository.name }}"
          if [ ! -z "${{ inputs.release_name }}" ]; then
            RELEASE_NAME="${{ inputs.release_name }}"
          fi
          helm upgrade -i ${RELEASE_NAME} ./deployments --install ${WAIT_ARG} ${TIMEOUT_ARG} --set image.tag="${{ inputs.image_tag }}" -n ${{ inputs.namespace }} ${ARG_VALUES_FILE}
      - name: Update GitHub release
        if: inputs.environment == 'prod'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.image_tag }}
          name: Release ${{ inputs.image_tag }}
          prerelease: false
          allowUpdates: true
          omitBodyDuringUpdate: true
          # DEVEX-1655 (2026-07-13): explicitly set makeLatest=legacy so
          # GitHub re-evaluates the "latest release" designation on this
          # PATCH. Per GH REST docs, if `make_latest` is not defined on
          # an update, "the release will not be reevaluated" — the
          # previous latest sticks. The ncipollo action documents
          # `legacy` as its default but doesn't actually pass the field
          # when the input is omitted, so we hit the "no reevaluation"
          # case.
          #
          # `legacy` = "determine based on release creation date and
          # higher semantic version," which is the semantic we want for
          # RT v2: every promoted rc becomes latest if it's semver-higher
          # than the previous latest. A rollback deploy of an older rc
          # will correctly leave the newer rc as latest.
          #
          # Surfaced 2026-07-13 on encodium/batch — rc.9 stayed pinned as
          # "latest" after rc.10/11/12 were successfully promoted.
          makeLatest: legacy
